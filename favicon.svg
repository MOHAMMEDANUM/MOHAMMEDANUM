<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: White Rounded Square -->
  <rect x="10" y="10" width="492" height="492" rx="100" ry="100" fill="#ffffff" stroke="#e5e7eb" stroke-width="10" />
  
  <!-- Typography Group -->
  <g transform="translate(256, 410)" text-anchor="middle">
    <!-- Letter E (Elite - Black) -->
    <text x="-100" y="0" 
          font-family="Arial, Helvetica, sans-serif" 
          font-weight="900" 
          font-size="420" 
          fill="#111827" 
          style="filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));">
      E
    </text>
    
    <!-- Letter L (Lancer - Indigo) -->
    <text x="100" y="0" 
          font-family="Arial, Helvetica, sans-serif" 
          font-weight="900" 
          font-size="420" 
          fill="#4F46E5" 
          style="filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));">
      L
    </text>
  </g>
</svg>